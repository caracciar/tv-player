<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Streaming Hub</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000;
			overflow-y: auto;
            font-family: sans-serif;
        }
		
		/* Esconder barra de desplazamiento para Chrome, Safari y Opera */
            body::-webkit-scrollbar {
            display: none;
        }

        /* Esconder barra para Internet Explorer, Edge y Firefox */
            body {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            min-height: 100vh;
            width: 100vw;
        }

        .box {
            /* Mantiene siempre 2 cajas por fila (50% de ancho) */
            flex: 1 0 50%; 
            /* Altura fija de media pantalla para cada fila */
            height: 50vh; 
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            background-position: center;
            background-repeat: no-repeat;
            transition: all 0.4s ease;
            box-sizing: border-box;
            border: 2px solid #111;
        }

        /* Logos directos de alta calidad */
        .box-netflix { 
            background-color: #000;
            background-image: url('https://assets.nflxext.com/us/ffe/siteui/common/icons/nficon2016.png'); 
            background-size: 20%;
        }
        .box-disney { 
            background-color: #000;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/7/77/Disney_Plus_logo.svg');
            background-size: 30%;
        }
        .box-paramount { 
            background-color: #000;
            background-image: url('https://static.wikia.nocookie.net/logopedia/images/8/82/Paramount%2B_2017.svg/revision/latest?cb=20191218190254');
            background-size: 30%;
        }
        .box-dgo { 
            background-color: #000;;
            background-image: url('https://www.directvgo.com/static/logo-CgyH95f-.svg');
            background-size: 30%;
        }
		.box-youtube { 
            background-color: #000;;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg');
            background-size: 30%;
        }
		.box-plutotv { 
            background-color: #000;;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Pluto_TV_logo_2024.svg/960px-Pluto_TV_logo_2024.svg.png');
            background-size: 30%;
        }
		.box-spotify { 
            background-color: #000;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/b/bd/2024_Spotify_Logo.svg/1920px-2024_Spotify_Logo.svg.png'); /* Símbolo de apagado rojo */
            background-size: 30%;
        }
		.box-config { 
            background-color: #000;
            background-image: url('https://www.iconsdb.com/icons/preview/white/settings-5-xxl.png'); /* Icono universal de engranaje */
            background-size: 30%;
        }
        .box-power { 
            background-color: #000;
            background-image: url('https://www.iconsdb.com/icons/preview/white/power-xxl.png'); /* Símbolo de apagado rojo */
            background-size: 30%;
        }
		
        .box-spotify { 
            background-color: #000;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/b/bd/2024_Spotify_Logo.svg/1920px-2024_Spotify_Logo.svg.png'); /* Símbolo de apagado rojo */
            background-size: 30%;
        }
        .box-stremio { 
            background-color: #000;
        /* El icónico logo del "Play" violeta de Stremio */
            background-image: url('https://docs.mdblist.com/assets/images/stremio.png');
            background-size: 50%;
        }

        /* Efecto de selección Smart TV */
        .box:hover {
            transform: scale(1.02);
            z-index: 10;
            border: 6px solid white;
            filter: brightness(1.2);
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="https://www.netflix.com" class="box box-netflix"></a>
        <a href="https://www.disneyplus.com" class="box box-disney"></a>
        <a href="https://www.paramountplus.com" class="box box-paramount"></a>
        <a href="https://www.directvgo.com" class="box box-dgo"></a>
		<a href="https://www.youtube.com" class="box box-youtube"></a>
	    <a href="https://www.plutotv.com" class="box box-plutotv"></a>
		<a href="https://www.spotify.com" class="box box-spotify"></a>
		<a href="https://web.stremio.com/" class="box box-stremio"></a>
		<a href="chrome://settings" class="box box-config"></a>
        <a href="chrome://os-settings/osPrivacy" class="box box-power"></a>
		
    </div>
</body>
</html>
